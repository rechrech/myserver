<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        async function redirectToServer() {
            try {
                // Reads the live tunnel address from the public bucket instantly
                const response = await fetch('https://kvdb.io/MN87yTq9Jq7qN6B4cZ8v8A/tunnel_url');
                const targetURL = await response.text();
                if (targetURL.startsWith('https://')) {
                    window.location.replace(targetURL.trim());
                } else {
                    document.body.innerHTML = "<h2>Waiting for Mac server to start...</h2>";
                }
            } catch (err) {
                document.body.innerHTML = "<h2>Error connecting to server log.</h2>";
            }
        }
        window.onload = redirectToServer;
    </script>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding-top: 40%; }
    </style>
</head>
<body>
    <p>Connecting to your Mac Server...</p>
</body>
</html>
