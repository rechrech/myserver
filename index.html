<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script>
        // Go fetch the changing URL from your iCloud file
        // Note: For security/browsing restrictions, we fetch the URL text directly
        async function redirectToServer() {
            try {
                // We will point this to a place your Mac can upload text to, 
                // but a simple trick is to have your Mac script push the URL straight to GitHub!
                const response = await fetch('https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/myserver/main/url.txt');
                const targetURL = await response.text();
                if (targetURL.startsWith('https://')) {
                    window.location.replace(targetURL.trim());
                } else {
                    document.body.innerHTML = "Waiting for Mac server to start...";
                }
            } catch (err) {
                document.body.innerHTML = "Error connecting to server log.";
            }
        }
        window.onload = redirectToServer;
    </script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 40%; }
    </style>
</head>
<body>
    Connecting to your Mac...
</body>
</html>
